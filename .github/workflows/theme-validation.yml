name: Test Hugo Theme

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        hugo-version: ['0.116.0', '0.120.0', 'latest']
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Hugo ${{ matrix.hugo-version }}
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ matrix.hugo-version }}
          extended: true
      
      - name: Show Hugo version
        run: hugo version

      - name: Install dependencies
        run: npm install

      - name: Run CSS build (verify no errors)
        run: npm run build

      - name: Verify generated CSS has content
        run: |
          if [[ ! -s assets/css/main.css ]]; then
            echo "ERROR: Generated CSS file is empty"
            exit 1
          fi
          echo "✓ Generated CSS file has content"
          echo "CSS file size: $(du -h assets/css/main.css)"

      - name: Validate CSS has expected selectors
        run: |
          # Verify the CSS contains some expected Tailwind/DaisyUI classes
          if grep -q "tailwind\|daisyui\|bg-\|text-\|container\|prose" assets/css/main.css; then
            echo "✓ CSS contains expected Tailwind/DaisyUI selectors"
          else
            echo "WARNING: CSS doesn't seem to contain expected Tailwind styles"
          fi

      - name: Install theme test site
        run: |
          # Create a sample site to test the theme
          mkdir -p /tmp/test-theme-site/themes
          cp -r . /tmp/test-theme-site/themes/hugo-theme-aronica
          
          cat > /tmp/test-theme-site/hugo.yaml << 'EOL'
          baseURL: https://aronica-test.example.com
          languageCode: zh-CN
          defaultContentLanguage: zh-Hans
          
          title: Test Site
          theme: hugo-theme-aronica
          
          params:
            Aronica:
              toc: true
              comment: true
              crawl: true
          
          menu:
            main:
              - name: Home
                url: "/"
                weight: 1
              - name: Posts
                url: "/posts/"
                weight: 2
              
          module:
            imports: []
          EOL

          # Create test content
          mkdir -p /tmp/test-theme-site/content/posts
          cat > /tmp/test-theme-site/content/posts/my-first-post.md << 'EOL'
          ---
          title: "My First Post"
          date: 2024-01-01T00:00:00+08:00
          draft: false
          Params:
            Aronica:
              toc: true
          ---
          
          This is my first post using the **Aronica theme**.
          
          ## Sample Heading
          
          Here is an example paragraph with *some emphasis*, **strong text**, and `inline code`.
          
          {{< highlight go >}}
          // Example Go code
          func main() {
              fmt.Println("Hello, Aronica!")
          }
          {{< /highlight >}}
          EOL

          cat > /tmp/test-theme-site/content/_index.md << 'EOL'
          ---
          title: "Home"
          ---
          
          cat > /tmp/test-theme-site/content/_index.md << 'EOL'
          ---
          title: "Home"
          ---
          
          Welcome to the example site with the **Aronica theme**!
          EOL
          
      - name: Test theme build
        run: |
          cd /tmp/test-theme-site
          hugo --themesDir themes --minify --verbose
          
      - name: Verify build worked
        run: |
          if [[ -f /tmp/test-theme-site/public/index.html ]] && [[ -s /tmp/test-theme-site/public/index.html ]]; then
            echo "✓ Theme build successful!"
            echo "Index file size: $(du -h /tmp/test-theme-site/public/index.html)"
          else
            echo "ERROR: Theme build failed - no index.html generated"
            exit 1
          fi
          
      - name: Verify CSS referenced in HTML
        run: |
          if grep -q "main.css\|tailwind" /tmp/test-theme-site/public/index.html; then
            echo "✓ CSS correctly included in output"
          else
            echo "WARNING: main.css not found in generated HTML"
          fi
          
      - name: Run basic linting
        run: |
          # Basic HTML validation - ensure there aren't obvious template syntax errors
          if grep -r "{{%" /tmp/test-theme-site/public/ --include="*.html" | head -5; then
            echo "ERROR: Found unprocessed Hugo templating syntax in output"
            exit 1
          fi
          echo "✓ No unprocessed templates found"