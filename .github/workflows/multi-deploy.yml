name: Build and Deploy to Multiple Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  HUGO_VERSION: '0.140.0'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache modules and build results
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
            assets/css/main.css
          key: ${{ runner.os }}-hugo-themebuild-${{ hashFiles('**/package-lock.json', 'assets/css/tailwind.css', 'tailwind.config.js') }}

      - name: Install Node dependencies
        run: npm ci

      - name: Build CSS with Tailwind
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify CSS build output
        run: |
          echo "CSS file info:"
          ls -la assets/css/main.css
          echo "CSS file size: $(wc -c < assets/css/main.css) bytes"
          head -20 assets/css/main.css

      - name: Create test site for theme validation
        run: |
          # Copy theme to test site
          mkdir -p /tmp/test-site/themes/aronica
          rsync -av --exclude='.git' ./ /tmp/test-site/themes/aronica/
          
          cd /tmp/test-site
          
          # Create configuration
          cat > hugo.yaml << 'CONFIG'
          baseURL: https://example.com
          languageCode: zh-CN
          title: Aronica Theme Test Site
          
          theme: aronica
          
          params:
            Aronica:
              toc: true
              comment: true 
              crawl: true
          
          menu:
            main:
              - name: Home
                url: /
                weight: 1
              - name: Posts
                url: /posts/
                weight: 2
CONFIG
          
          # Create content locations
          mkdir -p content/{posts,_global}
          
          cat > content/_index.md << 'INDEX'
          ---
          title: "Welcome"
          ---
          
          # Welcome to the Aronica Theme Demo
          
          This is a demonstration of the **Aronica Hugo theme** with Tailwind CSS and DaisyUI.
          
          ## Features
          
          - Responsive design
          - Dark mode support
          - Syntax highlighting
          - Custom shortcodes
          - SEO optimized
          INDEX
          
          cat > content/posts/demo-post.md << 'POST'
          ---
          title: "Demo Post"
          date: 2024-01-01T00:00:00+08:00
          draft: false
          Params:
            Aronica:
              toc: true
              comment: false
          ---
          
          # This is a Demo Post
          
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam in dui mauris. Vivamus hendrerit arcu sed erat molestie vehicula.
          
          ## Code Example
          
          {{< highlight javascript >}}
          function welcome() {
            console.log("Hello from Aronica theme!");
          }
          {{< /highlight >}}
          
          ## Table
          
          | Header 1 | Header 2 | Header 3 |
          |----------|----------|----------|
          | Cell 1   | Cell 2   | Cell 3   |
          | Cell 4   | Cell 5   | Cell 6   |
          
          ## Mermaid Diagram
          
          {{< mermaid >}}
          graph TD;
              A-->B;
              A-->C;
              B-->D;
              C-->D;
          {{< /mermaid >}}
          POST

      - name: Build Hugo site with theme
        run: |
          cd /tmp/test-site
          hugo --minify --verbose
          
      - name: Validate build output
        run: |
          cd /tmp/test-site
          if [ ! -f "public/index.html" ]; then
            echo "❌ Error: index.html was not generated"
            exit 1
          fi
          
          if [ ! -f "public/posts/demo-post/index.html" ]; then
            echo "❌ Error: demo post was not generated"
            exit 1
          fi
          
          # Check if the CSS is referenced in the HTML
          if ! grep -q "main.css" public/index.html; then
            echo "❌ Error: main.css not found in HTML output"
            exit 1
          fi
          
          echo "✅ Build validation successful!"
          echo "Generated $(find public -name "*.html" | wc -l) HTML files"
          echo "Generated site size: $(du -sh public | cut -f1)"

      - name: Upload built site as artifact
        uses: actions/upload-artifact@v3
        with:
          name: built-site
          path: /tmp/test-site/public/
          retention-days: 5

  deploy-netlify:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: netlify
    
    steps:
      - name: Download built site
        uses: actions/download-artifact@v3
        with:
          name: built-site
          path: public/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./public
          production-branch: main
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-vercel:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: vercel
    
    steps:
      - name: Checkout code (for Vercel CLI config)
        uses: actions/checkout@v4

      - name: Download built site
        uses: actions/download-artifact@v3
        with:
          name: built-site
          path: public/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          # Vercel expects the project files and a build output
          cp -r public/* ./
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}