name: CI

on:
  push:
    branches: [ main, develop, 'feature/**', 'bugfix/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 'latest'
        run_install: false

    - name: Get pnpm store path
      id: pnpm-cache
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-pnpm-store-

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.160.0'
        extended: true

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build CSS
      run: pnpm run build

    - name: Create test Hugo site
      run: |
        mkdir -p /tmp/test-hugo-site/themes
        cp -r . /tmp/test-hugo-site/themes/aronica
        cd /tmp/test-hugo-site
        cat > hugo.toml << 'EOF'
        baseURL = 'https://example.org/'
        languageCode = 'zh-CN'
        title = 'Test Site'
        theme = 'aronica'
        
        [params.Aronica]
        toc = true
        comment = false
        crawl = true
        EOF
        mkdir -p content/posts
        cat > content/posts/test.md << 'EOF'
        +++
        title = 'Test Post'
        date = 2024-01-01
        draft = false
        +++

        This is a test post to verify the theme builds correctly.
        EOF
        cat > content/_index.md << 'EOF'
        +++
        title = 'Home'
        +++

        Welcome to the test site.
        EOF

    - name: Build Hugo site
      run: |
        cd /tmp/test-hugo-site
        hugo --minify

    - name: Verify build output exists
      run: |
        if [ ! -d "/tmp/test-hugo-site/public" ]; then
          echo "Error: Hugo build did not produce public directory"
          exit 1
        fi
        if [ ! -f "/tmp/test-hugo-site/public/index.html" ]; then
          echo "Error: index.html not found in build output"
          exit 1
        fi
        echo "Build verification passed!"
        ls -la /tmp/test-hugo-site/public/
